<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instagram Login Clone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #fafafa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
        }

        .login-container {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 10px;
        }

        .logo {
            margin-bottom: 30px;
            width: 175px;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .input-field {
            width: 100%;
            padding: 9px 8px;
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            margin-bottom: 6px;
            font-size: 12px;
        }

        .input-field:focus {
            border-color: #a8a8a8;
            outline: none;
        }

        .login-btn {
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 5px 0;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
            margin-bottom: 20px;
        }

        .login-btn:disabled {
            background-color: #b2dffc;
            cursor: default;
        }

        .separator {
            display: flex;
            align-items: center;
            width: 100%;
            margin-bottom: 20px;
        }

        .line {
            height: 1px;
            flex: 1;
            background-color: #dbdbdb;
        }

        .or {
            padding: 0 18px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }

        .fb-login {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 20px;
            text-decoration: none;
        }

        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
        }

        .signup-container {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            width: 350px;
            padding: 20px;
            text-align: center;
            font-size: 14px;
        }

        .signup-container a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <img "https://tse4.mm.bing.net/th/id/OIP.KzJs8mDH6J41Ol6n5_HZmQHaHa?pid=Api&P=0" alt="Instagram">
        
        <form class="login-form" action="#" method="POST">
            <input type="text" class="input-field" placeholder="Phone number, username, or email" required>
            <input type="password" class="input-field" placeholder="Password" required>
            <button type="submit" class="login-btn">Log In</button>
        </form>

        <div class="separator">
            <div class="line"></div>
            <div class="or">OR</div>
            <div class="line"></div>
        </div>

        <a href="#" class="fb-login">Log in with Facebook</a>
        <a href="#" class="forgot-password">Forgot password?</a>
    </div>

    <div class="signup-container">
        <p>Don't have an account? <a href="#">Sign up</a></p>
    </div>

</body>
</html>
